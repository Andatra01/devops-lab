services:
  app:
    build: .
    networks: [backend]
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PASSWORD=${DB_PASSWORD}

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      retries: 5
    networks: [backend]

  nginx:
    image: nginx:alpine
    ports: ["8085:80"]
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [app]
    networks: [backend]

  adminer:
    image: adminer
    ports: ["8080:8080"]
    networks: [backend]
    depends_on: [db]

volumes:
  pgdata:

networks:
  backend:
